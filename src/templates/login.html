<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Video Generator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="container" style="min-height: 100vh; display: flex; flex-direction: column; justify-content: center;">
        <main class="main-content">
            <div class="card tech-glow" style="max-width: 400px; margin: 0 auto; margin-top: auto; margin-bottom: auto;">
                <h2>登录</h2>
                {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                        {% for category, message in messages %}
                            <div class="status-message error">{{ message }}</div>
                        {% endfor %}
                    {% endif %}
                {% endwith %}
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <input type="text" id="username" name="username" placeholder="请输入用户名" required style="width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: all 0.3s ease; background-color: rgba(255, 255, 255, 0.8);">
                    </div>
                    <div class="form-group">
                        <label for="password">密码</label>
                        <input type="password" id="password" name="password" placeholder="请输入密码" required style="width: 100%; padding: 15px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 14px; transition: all 0.3s ease; background-color: rgba(255, 255, 255, 0.8);">
                    </div>
                    <button type="submit" class="btn btn-primary submit-btn">登录</button>
                </form>
            </div>
        </main>
        <footer style="text-align: center; padding: 20px; color: var(--gray-color); font-size: 14px; margin-top: auto;">
            <p>Created with Vibe Coding Tool by Ethan</p>
            <p>如有问题请提交到 <a href="https://github.com/EthanNiWorld/video-generator-Ethan" target="_blank" style="color: var(--secondary-color); text-decoration: none;">https://github.com/EthanNiWorld/video-generator-Ethan</a></p>
        </footer>
    </div>
    <script>
        // 添加页面加载动画
        window.addEventListener('load', function() {
            document.body.style.opacity = '0';
            document.body.style.transition = 'opacity 0.5s ease';
            setTimeout(() => {
                document.body.style.opacity = '1';
            }, 100);
        });
    </script>
</body>
</html>
